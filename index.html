<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilstra KPI Dashboard</title>
<script src="kpi_data.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --donkergroen: #1e6b1e;
    --limegroen:   #8dc63f;
    --bg:          #f5f7f3;
    --border:      #dde8d5;
    --border2:     #c8dbb8;
    --text:        #1a2e10;
    --muted:       #6b8c5a;
    --dim:         #b0c8a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; min-height: 100vh; transition: background .3s; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(30,107,30,.045) 1px, transparent 1px), linear-gradient(90deg, rgba(30,107,30,.045) 1px, transparent 1px);
    background-size: 44px 44px; pointer-events: none; z-index: 0;
  }
  /* Rouleer modus — zelfde kleuren als normaal, geen donker thema */
  body.rouleer header .btn:not(.btn-tv) { display: none !important; }
  body.rouleer .saved-msg { display: none; }

  .wrap { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 24px 24px 40px; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 22px; flex-wrap: wrap; gap: 12px;
    background: white; border: 1px solid var(--border); border-left: 5px solid var(--donkergroen);
    border-radius: 20px; padding: 16px 24px;
    box-shadow: 0 2px 12px rgba(30,107,30,.08); transition: background .3s, border-color .3s;
  }
  .header-left { display: flex; align-items: center; gap: 18px; }
  .logo-img { width: 50px; height: 50px; object-fit: contain; }
  .eyebrow { font-size: 10px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 3px; }
  h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 2px; line-height: 1;
    background: linear-gradient(135deg, var(--donkergroen) 30%, var(--limegroen) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .datum { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .header-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

  /* update badge */
  .update-badge {
    font-size: 11px; color: var(--muted); background: var(--bg);
    border: 1px solid var(--border); border-radius: 99px;
    padding: 4px 12px; display: flex; align-items: center; gap: 6px;
    transition: background .3s, border-color .3s;
  }
  .update-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--limegroen); animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
  .refresh-bar-wrap { width: 80px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .refresh-bar { height: 100%; background: var(--limegroen); border-radius: 99px; transition: width 1s linear; }

  .btn {
    padding: 9px 18px; border-radius: 10px; border: 1px solid var(--border2);
    background: white; color: var(--muted); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    transition: all .15s; box-shadow: 0 1px 4px rgba(0,0,0,.06); white-space: nowrap;
  }
  .btn:hover { border-color: var(--donkergroen); color: var(--donkergroen); }
  .btn-groen { background: linear-gradient(135deg, var(--donkergroen), #2d8a2d); color: white; border-color: var(--donkergroen); box-shadow: 0 4px 16px rgba(30,107,30,.28); }
  .btn-groen:hover { box-shadow: 0 6px 22px rgba(30,107,30,.4); }
  .btn-tv { background: var(--bg); color: var(--donkergroen); border-color: var(--border2); font-weight: 700; }
  body.rouleer .btn-tv { background: var(--donkergroen); color: white; border-color: var(--donkergroen); }
  .saved-msg { color: var(--donkergroen); font-size: 13px; font-weight: 700; opacity: 0; transition: opacity .3s; }
  .saved-msg.show { opacity: 1; }
  
  

  .totaal-card {
    background: linear-gradient(135deg, var(--donkergroen), #2d8a2d);
    border-radius: 20px; padding: 20px 28px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 32px; flex-wrap: wrap;
    box-shadow: 0 4px 24px rgba(30,107,30,.25); position: relative; overflow: hidden;
  }
  .totaal-card::after { content: ''; position: absolute; right: -40px; top: -40px; width: 180px; height: 180px; border-radius: 50%; background: rgba(141,198,63,.12); pointer-events: none; }
  .totaal-score { text-align: center; min-width: 100px; }
  .totaal-score .lbl { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,.55); text-transform: uppercase; margin-bottom: 4px; }
  .totaal-score .getal { font-family: 'Bebas Neue', sans-serif; font-size: 66px; line-height: 1; color: white; }
  .totaal-score .pct { font-size: 24px; color: rgba(255,255,255,.45); }
  .totaal-balk { flex: 1; min-width: 200px; }
  .bar-lbl { display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; color: rgba(255,255,255,.45); }
  .cat-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-pill { padding: 5px 13px; border-radius: 99px; border: 1px solid rgba(255,255,255,.22); background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; }
  .cat-pill:hover { background: rgba(255,255,255,.2); color: white; }
  .cat-pill.active { background: var(--limegroen); border-color: var(--limegroen); color: var(--donkergroen); }

  .bar-track { background: rgba(0,0,0,.1); border-radius: 99px; overflow: hidden; }
  .bar-track.light { background: var(--bg); transition: background .3s; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

  .kaart {
    background: white; border: 1px solid var(--border); border-top: 3px solid var(--kaart-kleur);
    border-radius: 18px; padding: 20px 22px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05); transition: transform .2s, box-shadow .2s, background .3s, border-color .3s;
    animation: fadeIn .4s ease both;
  }
  .kaart:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(30,107,30,.1); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .kaart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .kaart-icon-naam { display: flex; align-items: center; gap: 12px; }
  .kaart-icon { width: 42px; height: 42px; border-radius: 12px; font-size: 20px; display: flex; align-items: center; justify-content: center; background: color-mix(in srgb, var(--kaart-kleur) 12%, white); border: 1px solid color-mix(in srgb, var(--kaart-kleur) 22%, white); transition: background .3s; }
  .kaart-naam { font-weight: 800; font-size: 15px; color: var(--text); letter-spacing: -.3px; transition: color .3s; }
  .kaart-count { font-size: 11px; color: var(--muted); margin-top: 2px; transition: color .3s; }
  .kaart-score-badge { padding: 5px 13px; border-radius: 99px; font-size: 15px; font-weight: 900; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }

  .kpi-list { margin-top: 14px; display: flex; flex-direction: column; gap: 15px; }
  .kpi-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 6px; }
  .kpi-naam { font-size: 13px; color: var(--muted); flex: 1; padding-right: 10px; line-height: 1.3; transition: color .3s; }
  .kpi-badge { font-size: 9px; background: #e0f0ff; color: #2563eb; padding: 2px 7px; border-radius: 99px; margin-left: 6px; vertical-align: middle; border: 1px solid #bfdbfe; }
  .kpi-waarde-area { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .kpi-waarde { font-weight: 800; font-size: 15px; }
  .kpi-doel-txt { font-size: 12px; color: var(--dim); transition: color .3s; }
  .kpi-pct-txt { font-size: 10px; color: var(--dim); text-align: right; margin-top: 3px; }

  .edit-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .edit-label { font-size: 10px; color: var(--muted); }
  input[type=number] { padding: 4px 8px; border-radius: 7px; border: 1.5px solid; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; text-align: right; width: 76px; -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number]:focus { outline: none; background: white; }

  footer { text-align: center; margin-top: 28px; font-size: 11px; color: var(--dim); letter-spacing: 1.5px; }

  /* ── ROULEER ── */
  .rouleer-header {
    display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: rgba(30,107,30,.92); backdrop-filter: blur(8px);
    border: 1px solid rgba(141,198,63,.3); border-radius: 99px;
    padding: 10px 28px; gap: 10px; align-items: center; z-index: 50;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
  }
  body.rouleer .rouleer-header { display: flex; }
  .rouleer-cat-naam {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px;
    color: white;
  }
  .rouleer-dots { display: flex; gap: 6px; align-items: center; }
  .rouleer-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.3); transition: all .3s;
  }
  .rouleer-dot.actief { background: var(--limegroen); transform: scale(1.3); }
  .rouleer-progress-wrap { width: 80px; height: 3px; background: rgba(255,255,255,.2); border-radius: 99px; overflow: hidden; }
  .rouleer-progress { height: 100%; background: var(--limegroen); border-radius: 99px; transition: width 1s linear; }

  /* ── ROULEER GROOT KAART ── */
  body.rouleer .wrap { padding: 16px 20px 80px; }
  body.rouleer .grid {
    grid-template-columns: 1fr !important;
    gap: 0;
  }
  body.rouleer .kaart {
    padding: 28px 40px;
    border-radius: 24px;
    max-height: calc(100vh - 240px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  body.rouleer .kaart-header { margin-bottom: 20px; }
  body.rouleer .kaart-icon { width: 64px; height: 64px; font-size: 32px; border-radius: 16px; }
  body.rouleer .kaart-naam { font-size: 38px; letter-spacing: -.8px; font-family: 'Bebas Neue', sans-serif; -webkit-text-fill-color: var(--donkergroen); }
  body.rouleer .kaart-count { font-size: 14px; margin-top: 3px; }
  body.rouleer .kaart-score-badge { font-size: 32px; padding: 8px 22px; font-family: 'Bebas Neue', sans-serif; }
  body.rouleer .kpi-list { gap: 20px; margin-top: 20px; }
  body.rouleer .kpi-naam { font-size: 20px; }
  body.rouleer .kpi-waarde { font-size: 28px; }
  body.rouleer .kpi-doel-txt { font-size: 18px; }
  body.rouleer .kpi-pct-txt { font-size: 14px; margin-top: 6px; }
  body.rouleer .bar-track.light { height: 14px !important; }
  body.rouleer .bar-track[style*="height:5px"] { height: 6px !important; }

  /* slide animatie */
  .grid.slide-in { animation: slideIn .45s cubic-bezier(.4,0,.2,1) both; }
  .grid.slide-out { animation: slideOut .35s cubic-bezier(.4,0,.2,1) both; }
  @keyframes slideIn  { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
  @keyframes slideOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(-40px); } }

  body.rouleer .btn-bewerk-tv { display: none !important; }

  /* ── WATCHER WAARSCHUWING ── */
  .watcher-warning {
    display: none;
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: #fff3cd; border: 1.5px solid #f59e0b;
    color: #92400e; border-radius: 12px; padding: 10px 20px;
    font-size: 13px; font-weight: 600; z-index: 100;
    box-shadow: 0 4px 16px rgba(245,158,11,.2);
    align-items: center; gap: 8px;
    animation: fadeIn .3s ease;
  }
  .watcher-warning.show { display: flex; }
  .watcher-warning-icon { font-size: 18px; }
</style>
</head>

    { id:"de_coll", naam:"Aantal collega's",  doel:10,  eenheid:"stuks" },
    { id:"de_opdr", naam:"Aantal opdrachten", doel:10,  eenheid:"stuks" },
  ]},
  { id:"det_zzp",   naam:"Detachering ZZP",  kleur:"#c0622a", icon:"🔧", kpis:[
    { id:"zzp_leads", naam:"Leads opdrachten",  doel:100, eenheid:"stuks" },
    { id:"zzp_nb",    naam:"Nader te benoemen", doel:35,  eenheid:"stuks" },
  ]},
  { id:"online",    naam:"Online Community", kleur:"#2e8fa8", icon:"🌐", kpis:[
    { id:"oc_leads",  naam:"Leads partner",       doel:1000, eenheid:"leads" },
    { id:"oc_deals",  naam:"Deals partner",        doel:100,  eenheid:"deals" },
    { id:"oc_huddle", naam:"Abonnementen Huddle",  doel:10,   eenheid:"stuks" },
    { id:"oc_zzpers", naam:"ZZP'ers",              doel:25,   eenheid:"stuks" },
  ]},
];

let waarden={}, doelen={}, bewerkModus=false, actief=null, tvModus=false;
const REFRESH_SEC = 600;
let refreshResterend = REFRESH_SEC;

// ── Laad data: altijd vanuit kpi_data.js (window.KPI_DATA) ──
function laadData(){
  // Vanuit Excel via watcher
  if(window.KPI_DATA){
    Object.assign(waarden, window.KPI_DATA);
  }
  // Handmatige doelen uit localStorage
  try{ const d=localStorage.getItem("kpi-doelen"); if(d) Object.assign(doelen, JSON.parse(d)); }catch(e){}
  // Vul ontbrekende waarden aan
  DATA.forEach(c=>c.kpis.forEach(k=>{
    if(waarden[k.id]===undefined) waarden[k.id]=0;
    if(k.openDoel && doelen[k.id]===undefined) doelen[k.id]=10;
  }));
  // Laatste update tijd tonen
  const tijd = window.KPI_LAATSTE_UPDATE || "onbekend";
  document.getElementById("updateTijd").textContent = tijd;
  controleerWatcher(tijd);
}

function controleerWatcher(tijdStr){
  // Parseer de tijdstempel uit kpi_data.js (formaat: "DD-MM-YYYY om HH:MM")
  try {
    if(!tijdStr || tijdStr === "onbekend" || tijdStr === "Nog niet bijgewerkt") return;
    const match = tijdStr.match(/(\d{2})-(\d{2})-(\d{4}) om (\d{2}):(\d{2})/);
    if(!match) return;
    const [_, d, m, y, h, min] = match;
    const updateTijd = new Date(y, m-1, d, h, min);
    const nu = new Date();
    const minGeleden = (nu - updateTijd) / 60000;
    const warning = document.getElementById("watcherWarning");
    if(minGeleden > 15){
      warning.classList.add("show");
    } else {
      warning.classList.remove("show");
    }
  } catch(e) {}
}

// ── Helpers ──
function getDoel(k){ return k.openDoel ? (doelen[k.id]??10) : k.doel; }
function pct(h,d){ if(!d) return 0; return Math.min(Math.round((h/d)*100),100); }
function kv(p){ return p>=80 ? "#1e6b1e" : p>=50 ? "#8a7a00" : "#c0622a"; }
function kb(p){ return p>=80 ? "#eaf6e0" : p>=50 ? "#fdf8e0" : "#fdecea"; }
function nl(n){ return n.toLocaleString("nl-NL"); }

function catScore(cat){
  let d=0,h=0;
  cat.kpis.forEach(k=>{ const dd=getDoel(k); if(dd>0){d+=dd; h+=Math.min(waarden[k.id]||0,dd);} });
  return d>0 ? Math.round((h/d)*100) : 0;
}
function totaalScore(){
  let d=0,h=0;
  DATA.forEach(c=>c.kpis.forEach(k=>{ const dd=getDoel(k); if(dd>0){d+=dd; h+=Math.min(waarden[k.id]||0,dd);} }));
  return d>0 ? Math.round((h/d)*100) : 0;
}

// ── Refresh countdown ──
function herlaadData(){
  // Haal kpi_data.js opnieuw op met cache-busting timestamp
  const script = document.createElement("script");
  script.src = "kpi_data.js?t=" + Date.now();
  script.onload = () => {
    laadData();   // verwerk nieuwe waarden
    render();     // herteken dashboard
    // Knippersignaal: update badge even groen oplichten
    const badge = document.querySelector(".update-badge");
    badge.style.transition = "background .3s";
    badge.style.background = "#d4edda";
    setTimeout(() => badge.style.background = "", 800);
  };
  script.onerror = () => {
    console.warn("kpi_data.js niet geladen — watcher actief?");
  };
  document.head.appendChild(script);
}

function startCountdown(){
  refreshResterend = REFRESH_SEC;
  clearInterval(window._cdInterval);
  window._cdInterval = setInterval(()=>{
    // Toon eerst, dan verlaag
    const m=Math.floor(refreshResterend/60).toString().padStart(2,"0");
    const s=(refreshResterend%60).toString().padStart(2,"0");
    document.getElementById("refreshCountdown").textContent = m+":"+s;
    document.getElementById("refreshBar").style.width=(refreshResterend/REFRESH_SEC*100)+"%";
    refreshResterend--;
    if(refreshResterend < 0){
      refreshResterend = REFRESH_SEC; // reset zodat teller direct doorloopt
      herlaadData();
    }
  },1000);
}

// ── Render ──
function render(){
  document.getElementById("datum").textContent =
    new Date().toLocaleDateString("nl-NL",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  const tot = totaalScore();
  document.getElementById("totaalGetal").innerHTML = tot+'<span class="pct">%</span>';
  document.getElementById("totaalBalk").style.width = tot+"%";

  document.getElementById("catPills").innerHTML = DATA.map(cat=>{
    const cs=catScore(cat), ia=actief===cat.id;
    return`<button class="cat-pill${ia?" active":""}" onclick="toggleFilter('${cat.id}')">${cat.icon} ${cs}%</button>`;
  }).join("");

  const cats = actief ? DATA.filter(c=>c.id===actief) : DATA;
  document.getElementById("grid").innerHTML = cats.map((cat,ci)=>{
    const cs=catScore(cat), sc=kv(cs), sbg=kb(cs);
    const rows = cat.kpis.map(kpi=>{
      const d=getDoel(kpi), h=waarden[kpi.id]||0, p=pct(h,d), kc=kv(p);
      const wStr = kpi.isPercent ? h+"%" : nl(h);
      const dStr = d ? (kpi.isPercent ? d+"%" : nl(d)+" "+kpi.eenheid) : "??";
      const edit = bewerkModus ?
        `<div class="edit-group">
          ${kpi.openDoel?`<span class="edit-label">Doel:</span><input type="number" min="0" value="${d}" onchange="setDoel('${kpi.id}',this.value)" style="border-color:#3b82f6">`:""}
          <input type="number" min="0" value="${h}" oninput="setWaarde('${kpi.id}',this.value)" style="border-color:${cat.kleur}">
        </div>` :
        `<div class="kpi-waarde-area">
          <span class="kpi-waarde" style="color:${kc}">${wStr}</span>
          <span class="kpi-doel-txt">/ ${dStr}</span>
        </div>`;
      return`<div class="kpi-row">
        <div class="kpi-top">
          <span class="kpi-naam">${kpi.naam}${kpi.openDoel?'<span class="kpi-badge">instelbaar</span>':""}</span>
          ${edit}
        </div>
        <div class="bar-track light" style="height:8px">
          <div class="bar-fill" style="width:${p}%;background:linear-gradient(90deg,${cat.kleur}66,${cat.kleur})"></div>
        </div>
        <div class="kpi-pct-txt">${p}%</div>
      </div>`;
    }).join("");
    return`<div class="kaart" style="--kaart-kleur:${cat.kleur};animation-delay:${ci*.06}s">
      <div class="kaart-header">
        <div class="kaart-icon-naam">
          <div class="kaart-icon">${cat.icon}</div>
          <div><div class="kaart-naam">${cat.naam}</div><div class="kaart-count">${cat.kpis.length} KPI's</div></div>
        </div>
        <div class="kaart-score-badge" style="color:${sc};background:${sbg};border:1px solid color-mix(in srgb,${sc} 25%,white)">${cs}%</div>
      </div>
      <div class="bar-track light" style="height:5px">
        <div class="bar-fill" style="width:${cs}%;background:linear-gradient(90deg,${cat.kleur}66,${cat.kleur})"></div>
      </div>
      <div class="kpi-list">${rows}</div>
    </div>`;
  }).join("");
}

function setWaarde(id,v){ waarden[id]=Math.max(0,Number(v)||0); render(); }
function setDoel(id,v){ doelen[id]=Math.max(1,Number(v)||1); render(); }
function toggleFilter(id){ actief=actief===id?null:id; render(); }
// ── ROULEER ──
const ROULEER_SEC = 8; // seconden per categorie
let rouleerIdx = 0, rouleerSec = ROULEER_SEC;
let rouleerInterval = null;

function rouleerStart(){
  rouleerIdx = 0;
  document.body.classList.add("rouleer");
  toonCategorie(rouleerIdx);
  bouwDots();
  clearInterval(rouleerInterval);
  rouleerSec = ROULEER_SEC;
  rouleerInterval = setInterval(rouleerTick, 1000);
}

function rouleerStop(){
  clearInterval(rouleerInterval);
  document.body.classList.remove("rouleer");
  actief = null;
  render();
}

function bouwDots(){
  document.getElementById("rouleerDots").innerHTML =
    DATA.map((_,i) => `<div class="rouleer-dot${i===rouleerIdx?" actief":""}"></div>`).join("");
}

function toonCategorie(idx){
  // Slide animatie
  const grid = document.getElementById("grid");
  grid.classList.remove("slide-in");
  grid.classList.add("slide-out");
  setTimeout(()=>{
    actief = DATA[idx].id;
    render();
    grid.classList.remove("slide-out");
    grid.classList.add("slide-in");
    setTimeout(()=>grid.classList.remove("slide-in"), 500);
  }, 350);

  document.getElementById("rouleerNaam").textContent = DATA[idx].naam;
  bouwDots();
  // Dots updaten
  const dots = document.querySelectorAll(".rouleer-dot");
  dots.forEach((d,i)=>d.classList.toggle("actief", i===idx));
}

function rouleerTick(){
  rouleerSec--;
  document.getElementById("rouleerProgress").style.width = (rouleerSec/ROULEER_SEC*100)+"%";
  if(rouleerSec <= 0){
    rouleerSec = ROULEER_SEC;
    rouleerIdx = (rouleerIdx + 1) % DATA.length;
    toonCategorie(rouleerIdx);
  }
}

function toggleTV(){
  tvModus = !tvModus;
  document.getElementById("btnTV").textContent = tvModus ? "⏹ Stop" : "🔄 Rouleer";
  if(tvModus){
    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    rouleerStart();
  } else {
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    rouleerStop();
  }
}
document.addEventListener("keydown",e=>{
  if(e.key==="t"||e.key==="T") toggleTV();
  if(e.key==="Escape"&&tvModus){
    tvModus=false;
    document.getElementById("btnTV").textContent="🔄 Rouleer";
    rouleerStop();
  }
});

function toggleBewerk(){
  bewerkModus=true;
  document.getElementById("btnBewerk").style.display="none";
  document.getElementById("btnSla").style.display="inline-block";
  document.getElementById("btnAnn").style.display="inline-block";
  clearInterval(window._cdInterval);
  render();
}
function annuleer(){
  bewerkModus=false; laadData();
  document.getElementById("btnBewerk").style.display="inline-block";
  document.getElementById("btnSla").style.display="none";
  document.getElementById("btnAnn").style.display="none";
  startCountdown(); render();
}
function slaOp(){
  localStorage.setItem("kpi-doelen", JSON.stringify(doelen));
  bewerkModus=false;
  document.getElementById("btnBewerk").style.display="inline-block";
  document.getElementById("btnSla").style.display="none";
  document.getElementById("btnAnn").style.display="none";
  const m=document.getElementById("savedMsg");
  m.classList.add("show"); setTimeout(()=>m.classList.remove("show"),3000);
  startCountdown(); render();
}

// ── Start ──
laadData();
render();
startCountdown();
</script>
</body>
